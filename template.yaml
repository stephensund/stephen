# =========================
# Anchors（仅保留通用能力）
# =========================
Anchor_PR: &Anchor_PR
  type: http
  interval: 86400
  proxy: DIRECT
  health-check:
    enable: true
    url: "https://www.g.cn/generate_204"
    interval: 300
  filter: "^(?!.*(到期|过期|剩余|网址|官网|邮箱|订阅|套餐|流量|说明|重置)).*$"

Anchor_HS: &Anchor_HS
  type: select
  include-all: true

Anchor_RP_TXT: &Anchor_RP_TXT
  type: http
  interval: 86400
  behavior: classical
  format: text

Anchor_RP_YAML: &Anchor_RP_YAML
  type: http
  interval: 86400
  behavior: classical
  format: yaml

# 区域筛选（按你的 ini 关键词/正则）
Anchor_HK: &Anchor_HK "(港|HK|Hong Kong)"
Anchor_JP: &Anchor_JP "(日本|东京|大阪|泉日|埼玉|川日|沪日|深日|日$|JP|Japan)"
Anchor_US: &Anchor_US "(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)"
Anchor_SG: &Anchor_SG "(新加坡|坡|狮城|SG|Singapore)"
Anchor_TW: &Anchor_TW "(台|新北|彰化|TW|Taiwan)"
Anchor_KR: &Anchor_KR "(KR|Korea|KOR|首尔|韩|韓)"


# =========================
# Proxy Providers（订阅区）
# =========================
proxy-providers:
  # 按需增删，名称不要重复；把 url 换成你的订阅链接，把机场1 机场2改成对应的名字
  机场1:
    <<: *Anchor_PR
    url: ""
    override:
      additional-prefix: "[机场1] "
  机场2:
    <<: *Anchor_PR
    url: ""
    override:
      additional-prefix: "[机场2] "


# =========================
# Core Config（保留必要内容）
# =========================
mixed-port: 7893
mode: rule
allow-lan: true
bind-address: "*"
tcp-concurrent: true
unified-delay: true
log-level: info
ipv6: true

profile:
  store-selected: true
  store-fake-ip: true

external-controller: 0.0.0.0:9090
external-ui-name: zashboard
external-ui: ui
secret: ""
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip

tun:
  enable: true
  stack: mixed
  dns-hijack: [0.0.0.0:53]
  auto-detect-interface: true
  auto-route: true
  auto-redirect: true
  strict-route: false
  endpoint-independent-nat: true

sniffer:
  enable: true
  override-destination: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    QUIC:
      ports: [443]
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  skip-domain:
    - "+.apple.com"
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  respect-rules: false
  fake-ip-filter:
    - "*.lan"
  nameserver:
    - 114.114.114.114
    - 223.5.5.5


# =========================
# Proxy Groups（严格按 ini）
# =========================
proxy-groups:
  # 主选择
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "🇭🇰 香港节点"
      - "🇨🇳 台湾节点"
      - "🇸🇬 狮城节点"
      - "🇯🇵 日本节点"
      - "🇺🇲 美国节点"
      - "🇰🇷 韩国节点"
      - "🚀 手动切换"
      - "DIRECT"

  - name: "🚀 手动切换"
    <<: *Anchor_HS

  # 区域组（按 ini 的 regex）
  - name: "🇭🇰 香港节点"
